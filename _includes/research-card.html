<div class="research-card">
  <div class="research-card__image">
    <a href="{{ include.url | relative_url }}">
      <img src="{{ include.image }}" alt="{{ include.alt }}" loading="lazy">
    </a>
  </div>
  <div class="research-card__body">
    <h4><a href="{{ include.url | relative_url }}">{{ include.title }}</a></h4>
    <p>{{ include.description }}</p>
    {% if include.funding %}<p class="research-card__funding">{{ include.funding }}</p>{% endif %}
  </div>
</div>
